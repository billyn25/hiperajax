<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Laboratorio Explorer</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box}body{font-family:Inter,Arial,sans-serif;margin:0;background:#101820;color:#eef6f2}.wrap{max-width:1120px;margin:auto;padding:24px}.top{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.top h1{margin:0}.badge{padding:8px 11px;border:1px solid #52697e;border-radius:999px;color:#cfe2f4;background:#1b2936}.info{color:#aebdca;margin:10px 0 18px}.search{display:grid;grid-template-columns:1fr auto;gap:10px}input{width:100%;padding:14px;border-radius:10px;border:1px solid #607284;background:#f7fafc;color:#15202b;font-size:16px}.examples{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}.examples button{border:1px solid #536a80;background:#1b2936;color:#dce9f5;padding:7px 10px;border-radius:999px;cursor:pointer}.summary{display:flex;gap:12px;justify-content:space-between;color:#aebdca;margin:12px 0}.row{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:12px;padding:11px 12px;margin:7px 0;border:1px solid #334454;border-radius:11px;background:#17222d}.name{font-weight:800}.meta{font-size:12px;color:#9eb1c2;margin-top:4px}.why{font-size:11px;color:#8eb6db;margin-top:5px}.score{font-weight:bold;color:#9fc8ee;align-self:center}.price{white-space:nowrap;align-self:center}.empty{padding:24px;text-align:center;color:#aebdca}.variant{display:inline-block;margin-left:7px;padding:2px 6px;border-radius:999px;background:#27394a;color:#bfd2e4;font-size:10px}
</style></head><body><div class="wrap"><div class="top"><h1>Laboratorio Explorer</h1><span class="badge" id="engineVersion">Motor</span></div><p class="info">Busca en todo el CSV. El conocimiento solo mejora el orden; nunca oculta productos nuevos.</p><div class="search"><input id="q" placeholder="Ej.: hub con fotos, repetidor motioncam, cámara sin NVR..."><span class="badge" id="status">Cargando…</span></div><div class="examples" id="examples"></div><div class="summary"><span id="resultCount"></span><span>Score visible para depurar el ranking</span></div><div id="out"></div></div>
<script src="explorer_knowledge.js"></script><script>
let products=[];const q=document.querySelector('#q'),out=document.querySelector('#out'),status=document.querySelector('#status'),count=document.querySelector('#resultCount'),examples=document.querySelector('#examples');
document.querySelector('#engineVersion').textContent='Motor '+HXA_KNOWLEDGE.version;
const samples=['hub','hub con fotos','hub 4g','hub wifi','hub negro','motioncam','motioncam phod','fotosensor','repetidor motioncam','cristal y movimiento','solo cristal','sirena exterior','domo','turret','bullet','camara sin nvr','nvr 8 hdmi','soporte camara'];
examples.innerHTML=samples.map(s=>`<button type="button">${s}</button>`).join('');examples.addEventListener('click',e=>{if(e.target.tagName==='BUTTON'){q.value=e.target.textContent;render();q.focus();}});
function parseCSV(text){const lines=text.replace(/^\uFEFF/,'').trim().split(/\r?\n/);const headers=lines.shift().split(';').map(x=>x.trim());return lines.map(line=>{const cols=line.split(';');const obj={};headers.forEach((h,i)=>obj[h]=cols[i]??'');return{name:obj.name||obj.ref||'',brand:obj.brand||'',description:obj.description||obj.descripcion||'',pvp:Number(String(obj.pvp||0).replace(',','.'))||0};}).filter(p=>p.name);}
fetch('catalogo_ajax.csv').then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text();}).then(t=>{products=parseCSV(t);status.textContent=`${products.length} productos`;q.focus();render();}).catch(e=>status.textContent='Error CSV: '+e.message);
function esc(v){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function render(){const query=q.value.trim();if(!query){out.innerHTML='<div class="empty">Escribe una búsqueda para probar el motor.</div>';count.textContent='';return;}const rows=HXA_KNOWLEDGE_ENGINE.rank(products,query,50);count.textContent=`${rows.length} resultados`;out.innerHTML=rows.length?rows.map(p=>`<div class="row"><div><div class="name">${esc(p.name)} <span class="variant">${p._color}</span></div><div class="meta">${esc(p.brand||'AJAX')}</div><div class="why">${esc((p._reasons||[]).slice(0,4).join(' · ')||'coincidencia general del CSV')}</div></div><div class="score">${p._score.toFixed(1)}</div><div class="price">${p.pvp.toFixed(2)} €</div></div>`).join(''):'<div class="empty">Sin resultados</div>';}
q.addEventListener('input',render);render();
</script></body></html>
